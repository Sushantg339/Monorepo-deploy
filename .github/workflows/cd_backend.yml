name: Deploy the backend

on:
  push:
    branches: [ master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v2

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile.backend
          push: true
          tags: sushantg339/mono-backend:${{ github.sha }}
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
      
      - name: Deploy to EC2 
        uses: appleboy/ssh-action@v1.2.2 
        with: 
          host: ${{ secrets.VM_IP }} 
          username: ubuntu key: ${{ secrets.SSH_PRIVATE_KEY }} 
          script: | 
            docker pull sushantg339/mono-backend:latest 
            docker stop mono_backend || true 
            docker rm mono_backend || true 
            docker run -d \ 
              --name mono_backend \ 
              --restart unless-stopped \ 
              -p 8080:8080 \ 
              sushantg339/mono-backend:latest 
            
            docker image prune -f